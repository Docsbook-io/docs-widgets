<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Translation Languages</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --text-muted: #6b7280;
      --tag-bg: #f3f4f6;
      --tag-active-bg: #eff6ff;
      --tag-active-border: #3b82f6;
      --tag-active-text: #1d4ed8;
      --toggle-off: #d1d5db;
      --toggle-on: #3b82f6;
      --toggle-thumb: #ffffff;
      --footer-bg: #f9fafb;
      --btn-bg: #ffffff;
      --btn-border: #d1d5db;
      --btn-text: #111827;
      --btn-hover: #f9fafb;
      --btn-disabled-bg: #f3f4f6;
      --btn-disabled-border: #e5e7eb;
      --btn-disabled-text: #9ca3af;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --border: #2a2a2a;
        --text: #ededed;
        --text-muted: #888888;
        --tag-bg: #1a1a1a;
        --tag-active-bg: #1e3a5f;
        --tag-active-border: #3b82f6;
        --tag-active-text: #93c5fd;
        --toggle-off: #333333;
        --toggle-on: #3b82f6;
        --toggle-thumb: #111111;
        --footer-bg: #0a0a0a;
        --btn-bg: #ededed;
        --btn-border: #555555;
        --btn-text: #111111;
        --btn-hover: #ffffff;
        --btn-disabled-bg: #1a1a1a;
        --btn-disabled-border: #2a2a2a;
        --btn-disabled-text: #555555;
      }
    }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 80px; color: var(--text-muted); font-size: 13px;
    }

    #app { display: none; padding: 16px; }

    .section-title {
      font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px;
    }
    .section-desc {
      font-size: 12px; color: var(--text-muted); margin-bottom: 12px;
    }

    .lang-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
    }

    .lang-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--tag-bg);
      cursor: pointer;
      text-align: left;
      transition: all 0.12s ease;
    }
    .lang-btn.active {
      border-color: var(--tag-active-border);
      background: var(--tag-active-bg);
    }
    .lang-btn:hover { opacity: 0.85; }

    .toggle-track {
      position: relative; flex-shrink: 0;
      width: 32px; height: 18px; border-radius: 9999px;
      background: var(--toggle-off);
      transition: background 0.12s ease;
    }
    .toggle-track.on { background: var(--toggle-on); }
    .toggle-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px; border-radius: 9999px;
      background: var(--toggle-thumb);
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
      transition: transform 0.12s ease;
    }
    .toggle-track.on .toggle-thumb { transform: translateX(14px); }

    .lang-label { font-size: 12px; color: var(--text); }
    .lang-btn.active .lang-label { color: var(--tag-active-text); }

    .footer {
      margin-top: 16px; padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .footer-status { font-size: 12px; color: var(--text-muted); }

    .save-btn {
      padding: 6px 16px; border-radius: 8px; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.12s ease; white-space: nowrap;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--btn-text);
    }
    .save-btn:hover:not(:disabled) { background: var(--btn-hover); }
    .save-btn:disabled {
      background: var(--btn-disabled-bg);
      border-color: var(--btn-disabled-border);
      color: var(--btn-disabled-text);
      cursor: not-allowed;
    }

    .gated-notice {
      padding: 12px 16px; border-radius: 8px;
      border: 1px dashed var(--border);
      text-align: center; font-size: 13px; color: var(--text-muted);
    }
  </style>
</head>
<body>

<div id="loading">Loading…</div>
<div id="app"></div>

<script>
(function () {
  'use strict';

  var SUPPORTED_LANGUAGES = [
    { code: 'en', label: 'English' },
    { code: 'es', label: 'Spanish' },
    { code: 'fr', label: 'French' },
    { code: 'de', label: 'German' },
    { code: 'pt', label: 'Portuguese' },
    { code: 'it', label: 'Italian' },
    { code: 'ru', label: 'Russian' },
    { code: 'zh', label: 'Chinese' },
    { code: 'ja', label: 'Japanese' },
    { code: 'ko', label: 'Korean' },
    { code: 'ar', label: 'Arabic' },
    { code: 'hi', label: 'Hindi' },
    { code: 'tr', label: 'Turkish' },
    { code: 'pl', label: 'Polish' },
    { code: 'nl', label: 'Dutch' },
  ];

  var enabledLanguages = [];
  var savedLanguages = [];
  var plan = 'free';

  function isDirty() {
    var a = enabledLanguages.slice().sort().join(',');
    var b = savedLanguages.slice().sort().join(',');
    return a !== b;
  }

  function render() {
    var app = document.getElementById('app');
    app.innerHTML = '';

    var isFree = plan === 'free';

    if (isFree) {
      var notice = document.createElement('div');
      notice.className = 'gated-notice';
      notice.textContent = 'Translation languages are available on Pro.';
      app.appendChild(notice);
      return;
    }

    var title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = 'Translation languages';
    app.appendChild(title);

    var desc = document.createElement('div');
    desc.className = 'section-desc';
    desc.textContent = 'Toggle languages to enable AI translation for your docs.';
    app.appendChild(desc);

    var grid = document.createElement('div');
    grid.className = 'lang-grid';

    SUPPORTED_LANGUAGES.forEach(function (lang) {
      var active = enabledLanguages.indexOf(lang.code) !== -1;
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'lang-btn' + (active ? ' active' : '');

      var track = document.createElement('div');
      track.className = 'toggle-track' + (active ? ' on' : '');
      var thumb = document.createElement('div');
      thumb.className = 'toggle-thumb';
      track.appendChild(thumb);

      var label = document.createElement('span');
      label.className = 'lang-label';
      label.textContent = lang.label;

      btn.appendChild(track);
      btn.appendChild(label);

      btn.addEventListener('click', function () {
        var idx = enabledLanguages.indexOf(lang.code);
        if (idx === -1) {
          enabledLanguages.push(lang.code);
        } else {
          enabledLanguages.splice(idx, 1);
        }
        render();
      });

      grid.appendChild(btn);
    });

    app.appendChild(grid);

    // Footer
    var footer = document.createElement('div');
    footer.className = 'footer';

    var status = document.createElement('span');
    status.className = 'footer-status';
    status.textContent = enabledLanguages.length + ' language' + (enabledLanguages.length !== 1 ? 's' : '') + ' enabled';
    footer.appendChild(status);

    var btn = document.createElement('button');
    btn.className = 'save-btn';
    btn.textContent = 'Save';
    btn.disabled = !isDirty();
    btn.addEventListener('click', handleSave);
    footer.appendChild(btn);

    app.appendChild(footer);
  }

  function handleSave() {
    if (!isDirty()) return;
    window.parent.postMessage({ type: 'ui/patch', patch: { enabledLanguages: enabledLanguages.slice() } }, '*');
    savedLanguages = enabledLanguages.slice();
    render();
  }

  function initFromSeed(seed) {
    if (!seed) return;
    enabledLanguages = Array.isArray(seed.enabledLanguages) ? seed.enabledLanguages.slice() : [];
    savedLanguages = enabledLanguages.slice();
    plan = String(seed.plan || 'free');

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    render();
  }

  window.addEventListener('message', function (event) {
    var msg = event.data;
    if (!msg || typeof msg.type !== 'string') return;
    if (msg.type === 'ui/initialize') {
      initFromSeed(msg.seed);
    }
  });

  window.parent.postMessage({ type: 'ui/ready' }, '*');
})();
</script>
</body>
</html>
