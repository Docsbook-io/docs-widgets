<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cost Analysis</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:#111;background:#fff;padding:16px}
  h3{font-size:14px;font-weight:600;margin-bottom:4px}
  p.desc{font-size:12px;color:#666;margin-bottom:12px}
  .loading{color:#888;font-size:12px}
  .error{color:#e53e3e;font-size:12px;padding:8px;background:#fff5f5;border-radius:6px}
  .total-box{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;margin-bottom:12px}
  .total-label{font-size:11px;color:#6b7280;font-weight:500}
  .total-val{font-size:20px;font-weight:700;color:#111}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:left;padding:6px 8px;border-bottom:1px solid #e5e7eb;color:#6b7280;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  td{padding:6px 8px;border-bottom:1px solid #f3f4f6;color:#374151}
  td.cost{text-align:right;font-weight:600;color:#111}
  td.pct{text-align:right;color:#9ca3af;font-size:11px}
  .empty{color:#9ca3af;font-size:12px;padding:12px 0;text-align:center}
</style>
</head>
<body>
<div id="app"><p class="loading">Loading…</p></div>

<script>
// ── callTool bridge ──────────────────────────────────────────────────────────
function callTool(name, args) {
  return new Promise(function(resolve, reject) {
    var id = Math.random().toString(36).slice(2) + Date.now();
    function handler(e) {
      var d = e.data;
      if (!d || d.type !== 'ui/toolResult' || d.id !== id) return;
      window.removeEventListener('message', handler);
      if (d.ok) resolve(d.result);
      else reject(new Error(d.error || 'tool error'));
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: 'ui/callTool', id: id, name: name, args: args }, '*');
  });
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

var workspaceId = null;

function render(data) {
  var app = document.getElementById('app');
  var breakdown = data.costBreakdown || [];
  var total = data.totalEstimatedCost || 0;

  if (breakdown.length === 0) {
    app.innerHTML = '<h3>AI Cost Analysis</h3><p class="desc">Estimated cost breakdown by model and provider.</p><div class="empty">No cost data available yet.</div>';
    return;
  }

  var totalHtml = '<div class="total-box">'
    + '<span class="total-label">Total Estimated Monthly Cost</span>'
    + '<span class="total-val">$' + esc(total.toFixed(4)) + '</span>'
    + '</div>';

  var trs = breakdown.map(function(item){
    var pct = total > 0 ? ((item.estimatedCost / total) * 100).toFixed(1) : '0.0';
    return '<tr>'
      + '<td>' + esc(item.model || '—') + '</td>'
      + '<td style="color:#6b7280;font-size:11px">' + esc(item.provider || '—') + ' · ' + esc(item.count) + ' ' + (item.count === 1 ? 'query' : 'queries') + '</td>'
      + '<td class="cost">$' + esc(item.estimatedCost.toFixed(4)) + '</td>'
      + '<td class="pct">' + pct + '%</td>'
      + '</tr>';
  }).join('');

  app.innerHTML = '<h3>AI Cost Analysis</h3>'
    + '<p class="desc">Estimated cost breakdown by AI model and provider. Prices estimated based on input/output tokens.</p>'
    + totalHtml
    + '<table><thead><tr><th>Model</th><th>Provider</th><th style="text-align:right">Cost</th><th style="text-align:right">Share</th></tr></thead><tbody>' + trs + '</tbody></table>';
}

function load() {
  if (!workspaceId) return;
  document.getElementById('app').innerHTML = '<p class="loading">Loading…</p>';
  callTool('analytics.ai_usage', { workspaceId: workspaceId })
    .then(function(data) { render(data); })
    .catch(function(err) {
      document.getElementById('app').innerHTML = '<p class="error">Failed to load: ' + esc(err.message) + '</p>';
    });
}

window.addEventListener('message', function(e) {
  var d = e.data;
  if (!d || d.type !== 'ui/initialize') return;
  var seed = d.seed || {};
  workspaceId = seed.workspaceId;
  load();
});

window.parent.postMessage({ type: 'ui/ready' }, '*');
</script>
</body>
</html>
