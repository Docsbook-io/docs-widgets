<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCP Example Questions</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: transparent;
      color: #0f172a;
      padding: 16px;
      font-size: 14px;
    }
    @media (prefers-color-scheme: dark) {
      body { color: #e2e8f0; }
      .item-row { border-color: #334155; background: #1e293b; }
      .item-row:hover { background: #243447; }
      input[type="text"] { background: #0f172a; border-color: #334155; color: #e2e8f0; }
      input[type="text"]:focus { border-color: #6366f1; }
      .btn-remove { color: #94a3b8; }
      .btn-remove:hover { color: #ef4444; background: #3f1212; }
      .btn-add { border-color: #334155; color: #94a3b8; background: #1e293b; }
      .btn-add:hover { background: #243447; }
      .btn-save { background: #6366f1; }
      .btn-save:hover { background: #4f46e5; }
      .btn-save:disabled { background: #334155; color: #64748b; }
      .empty { color: #64748b; }
    }
    .item-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .item-row {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 8px 4px 4px;
      border: 1px solid #e2e8f0; border-radius: 8px;
      background: #f8fafc; transition: background 0.1s;
    }
    .item-rank {
      min-width: 24px; text-align: center; font-size: 12px;
      color: #94a3b8; font-weight: 500;
    }
    input[type="text"] {
      flex: 1; border: 1px solid #e2e8f0; border-radius: 6px;
      padding: 6px 8px; font-size: 13px; background: #fff;
      outline: none; transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #6366f1; }
    .btn-remove {
      flex-shrink: 0; background: none; border: none; cursor: pointer;
      color: #94a3b8; font-size: 16px; padding: 4px 6px; border-radius: 4px;
      transition: all 0.15s; line-height: 1;
    }
    .btn-remove:hover { color: #ef4444; background: #fef2f2; }
    .btn-add {
      width: 100%; padding: 8px; border: 1px dashed #d1d5db;
      border-radius: 8px; background: #f8fafc; cursor: pointer;
      font-size: 13px; color: #6b7280; transition: all 0.15s;
    }
    .btn-add:hover { background: #f1f5f9; color: #4f46e5; border-color: #a5b4fc; }
    .footer { display: flex; justify-content: flex-end; margin-top: 16px; }
    .btn-save {
      padding: 8px 20px; background: #6366f1; color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-save:hover { background: #4f46e5; }
    .btn-save:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
    .empty { color: #94a3b8; font-size: 13px; padding: 12px 0; text-align: center; }
  </style>
</head>
<body>

<div id="root"><div class="empty">Loading…</div></div>

<script>
  let questions = []
  let saved = []
  let initialized = false

  function isDirty() {
    if (questions.length !== saved.length) return true
    return questions.some((q, i) => q !== saved[i])
  }

  function render() {
    const root = document.getElementById("root")
    root.innerHTML = `
      <div class="item-list" id="list">
        ${questions.length === 0
          ? '<div class="empty">No example questions yet. Add one below.</div>'
          : questions.map((q, i) => `
            <div class="item-row" data-idx="${i}">
              <span class="item-rank">${i + 1}</span>
              <input type="text" value="${escapeAttr(q)}" data-idx="${i}" placeholder="Enter a question…" />
              <button class="btn-remove" data-idx="${i}" title="Remove">&times;</button>
            </div>
          `).join("")}
      </div>
      <button class="btn-add" id="btn-add">+ Add question</button>
      <div class="footer">
        <button class="btn-save" id="btn-save" ${isDirty() ? "" : "disabled"}>Save</button>
      </div>
    `

    root.querySelectorAll("input[type=text]").forEach(input => {
      input.addEventListener("input", (e) => {
        const idx = parseInt(e.target.dataset.idx, 10)
        questions[idx] = e.target.value
        updateSaveBtn()
      })
    })

    root.querySelectorAll(".btn-remove").forEach(btn => {
      btn.addEventListener("click", () => {
        const idx = parseInt(btn.dataset.idx, 10)
        questions.splice(idx, 1)
        render()
      })
    })

    root.querySelector("#btn-add").addEventListener("click", () => {
      questions.push("")
      render()
      // Focus new input
      const inputs = root.querySelectorAll("input[type=text]")
      if (inputs.length > 0) inputs[inputs.length - 1].focus()
    })

    root.querySelector("#btn-save").addEventListener("click", () => {
      const cleaned = questions.filter(q => q.trim())
      questions = cleaned
      saved = [...cleaned]
      // Emit patch
      window.parent.postMessage({
        type: "ui/patch",
        patch: { mcpExampleQuestions: cleaned }
      }, "*")
      render()
    })
  }

  function updateSaveBtn() {
    const btn = document.getElementById("btn-save")
    if (btn) btn.disabled = !isDirty()
  }

  function escapeAttr(str) {
    return String(str).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/'/g, "&#39;").replace(/</g, "&lt;")
  }

  window.addEventListener("message", (event) => {
    const msg = event.data
    if (!msg || typeof msg.type !== "string") return
    if (msg.type === "ui/initialize") {
      const seed = msg.seed || {}
      const list = seed.mcpExampleQuestions
      if (Array.isArray(list)) {
        questions = list.map(String)
      } else if (typeof list === "string") {
        questions = list.split("\n").filter(Boolean)
      } else {
        questions = []
      }
      saved = [...questions]
      initialized = true
      render()
    }
  })

  window.parent.postMessage({ type: "ui/ready" }, "*")
</script>
</body>
</html>
