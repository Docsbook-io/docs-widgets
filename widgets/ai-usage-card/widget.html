<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Usage</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:#111;background:#fff;padding:16px}
  h3{font-size:14px;font-weight:600;margin-bottom:4px}
  p.desc{font-size:12px;color:#666;margin-bottom:12px}
  .loading{color:#888;font-size:12px}
  .error{color:#e53e3e;font-size:12px;padding:8px;background:#fff5f5;border-radius:6px}
  .usage-row{margin-bottom:16px}
  .row-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
  .row-label{font-size:13px;font-weight:600;color:#111}
  .row-pct{font-size:13px;font-weight:500;color:#6b7280}
  .row-pct.near{color:#f59e0b}
  .row-pct.at{color:#ef4444}
  .row-sub{font-size:11px;color:#9ca3af;margin-bottom:6px}
  .bar-track{width:100%;height:8px;border-radius:9999px;background:#e5e7eb;overflow:hidden}
  .bar-fill{height:100%;border-radius:9999px;background:#3b82f6;transition:width .4s}
  .bar-fill.near{background:#f59e0b}
  .bar-fill.at{background:#ef4444}
  .bar-fill.violet{background:#8b5cf6}
</style>
</head>
<body>
<div id="app"><p class="loading">Loading…</p></div>

<script>
// ── callTool bridge ──────────────────────────────────────────────────────────
function callTool(name, args) {
  return new Promise(function(resolve, reject) {
    var id = Math.random().toString(36).slice(2) + Date.now();
    function handler(e) {
      var d = e.data;
      if (!d || d.type !== 'ui/toolResult' || d.id !== id) return;
      window.removeEventListener('message', handler);
      if (d.ok) resolve(d.result);
      else reject(new Error(d.error || 'tool error'));
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: 'ui/callTool', id: id, name: name, args: args }, '*');
  });
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtDate(iso) {
  try { return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
  catch(e){ return iso||''; }
}

var workspaceId = null;

function usageBarHtml(label, used, limit, resetAt, color) {
  var pct = Math.min((used / Math.max(limit, 1)) * 100, 100);
  var isAt = pct >= 100;
  var isNear = !isAt && pct >= 80;
  var cls = isAt ? 'at' : (isNear ? 'near' : (color || ''));
  var sub = (resetAt ? 'Resets ' + fmtDate(resetAt) + ' · ' : '')
    + used.toLocaleString() + ' / ' + limit.toLocaleString() + ' used';
  return '<div class="usage-row">'
    + '<div class="row-header"><span class="row-label">'+esc(label)+'</span><span class="row-pct '+cls+'">'+pct.toFixed(0)+'% used</span></div>'
    + '<div class="row-sub">'+esc(sub)+'</div>'
    + '<div class="bar-track"><div class="bar-fill '+cls+'" style="width:'+pct+'%"></div></div>'
    + '</div>';
}

function render(data) {
  var app = document.getElementById('app');
  var used = data.used || 0;
  var limit = data.limit || 0;
  var resetAt = data.resetAt || null;
  var txUsed = data.translationUsed || 0;
  var txLimit = data.translationLimit || 30;
  var txResetAt = data.translationResetAt || null;

  var html = '<h3>Usage</h3>'
    + '<p class="desc">Monthly limits reset each billing period. Upgrade your plan to unlock higher limits.</p>'
    + usageBarHtml('All queries', used, limit, resetAt, '')
    + (txLimit > 0 ? usageBarHtml('Pages translated', txUsed, txLimit, txResetAt, 'violet') : '');

  app.innerHTML = html;
}

function load() {
  if (!workspaceId) return;
  document.getElementById('app').innerHTML = '<p class="loading">Loading…</p>';
  callTool('analytics.ai_usage', { workspaceId: workspaceId })
    .then(function(data) { render(data); })
    .catch(function(err) {
      document.getElementById('app').innerHTML = '<p class="error">Failed to load: ' + esc(err.message) + '</p>';
    });
}

window.addEventListener('message', function(e) {
  var d = e.data;
  if (!d || d.type !== 'ui/initialize') return;
  var seed = d.seed || {};
  workspaceId = seed.workspaceId;
  load();
});

window.parent.postMessage({ type: 'ui/ready' }, '*');
</script>
</body>
</html>
