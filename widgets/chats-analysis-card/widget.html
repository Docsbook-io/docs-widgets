<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chats Analysis</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:#111;background:#fff;padding:16px}
  h3{font-size:14px;font-weight:600;margin-bottom:4px}
  p.desc{font-size:12px;color:#666;margin-bottom:12px}
  .loading{color:#888;font-size:12px}
  .error{color:#e53e3e;font-size:12px;padding:8px;background:#fff5f5;border-radius:6px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:left;padding:6px 8px;border-bottom:1px solid #e5e7eb;color:#6b7280;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  td{padding:6px 8px;border-bottom:1px solid #f3f4f6;vertical-align:top;color:#374151}
  td.time{color:#9ca3af;white-space:nowrap;font-size:11px}
  td.question{max-width:280px;word-break:break-word}
  td.answer{max-width:320px;word-break:break-word;color:#6b7280}
  .chart{display:flex;align-items:flex-end;gap:2px;height:48px;margin-bottom:12px}
  .bar{flex:1;background:#3b82f6;border-radius:2px 2px 0 0;min-height:2px;cursor:pointer;opacity:.7;transition:opacity .15s}
  .bar:hover{opacity:1}
  .chart-label{display:flex;justify-content:space-between;font-size:10px;color:#9ca3af;margin-bottom:8px}
  .section{margin-bottom:16px}
  .empty{color:#9ca3af;font-size:12px;padding:12px 0;text-align:center}
</style>
</head>
<body>
<div id="app"><p class="loading">Loading…</p></div>

<script>
// ── callTool bridge ──────────────────────────────────────────────────────────
// Sends ui/callTool to the host and resolves with the result, or rejects on
// error. Each call generates a unique id so concurrent calls don't cross.
function callTool(name, args) {
  return new Promise(function(resolve, reject) {
    var id = Math.random().toString(36).slice(2) + Date.now();
    function handler(e) {
      var d = e.data;
      if (!d || d.type !== 'ui/toolResult' || d.id !== id) return;
      window.removeEventListener('message', handler);
      if (d.ok) resolve(d.result);
      else reject(new Error(d.error || 'tool error'));
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: 'ui/callTool', id: id, name: name, args: args }, '*');
  });
}

// ── helpers ──────────────────────────────────────────────────────────────────
function fmtTime(iso) {
  try {
    var d = new Date(iso);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  } catch(e) { return iso || ''; }
}
function fmtDate(iso) {
  try {
    var d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  } catch(e) { return iso || ''; }
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

var workspaceId = null;

function render(data) {
  var app = document.getElementById('app');
  var daily = data.dailySeries || [];
  var questions = data.questions || {};

  // Build flattened sorted question list
  var rows = [];
  Object.keys(questions).forEach(function(date) {
    var qs = questions[date] || [];
    qs.forEach(function(q) { rows.push({ date: date, time: q.time, question: q.question, answer: q.answer }); });
  });
  rows.sort(function(a, b) { return (b.time || '').localeCompare(a.time || ''); });

  // Chart
  var chartHtml = '';
  if (daily.length > 0) {
    var maxCount = Math.max.apply(null, daily.map(function(d){ return d.count || 0; }));
    if (maxCount < 1) maxCount = 1;
    var bars = daily.map(function(d){
      var h = Math.max(2, Math.round((d.count / maxCount) * 44));
      return '<div class="bar" title="' + esc(fmtDate(d.date)) + ': ' + esc(d.count) + ' queries" style="height:' + h + 'px"></div>';
    }).join('');
    var first = daily[0] ? fmtDate(daily[0].date) : '';
    var last = daily[daily.length - 1] ? fmtDate(daily[daily.length - 1].date) : '';
    chartHtml = '<div class="section"><div class="chart">' + bars + '</div>'
      + '<div class="chart-label"><span>' + esc(first) + '</span><span>' + esc(last) + '</span></div></div>';
  }

  // Table
  var tableHtml = '';
  if (rows.length === 0) {
    tableHtml = '<div class="empty">No chat sessions recorded yet.</div>';
  } else {
    var trs = rows.slice(0, 50).map(function(r){
      return '<tr>'
        + '<td class="time">' + esc(fmtTime(r.time)) + '</td>'
        + '<td class="question">' + esc(r.question || '(empty)') + '</td>'
        + '<td class="answer">' + esc((r.answer || '').replace(/<[^>]+>/g,'').trim().slice(0,120) || '—') + '</td>'
        + '</tr>';
    }).join('');
    tableHtml = '<table><thead><tr><th>Time</th><th>Question</th><th>Answer</th></tr></thead><tbody>' + trs + '</tbody></table>';
  }

  app.innerHTML = '<h3>Chats Analysis</h3>'
    + '<p class="desc">Click a bar to filter queries for that day.</p>'
    + chartHtml
    + tableHtml;
}

function load() {
  if (!workspaceId) return;
  document.getElementById('app').innerHTML = '<p class="loading">Loading…</p>';
  callTool('analytics.ai_usage', { workspaceId: workspaceId })
    .then(function(data) { render(data); })
    .catch(function(err) {
      document.getElementById('app').innerHTML = '<p class="error">Failed to load: ' + esc(err.message) + '</p>';
    });
}

// ── postMessage listener ──────────────────────────────────────────────────────
window.addEventListener('message', function(e) {
  var d = e.data;
  if (!d || d.type !== 'ui/initialize') return;
  var seed = d.seed || {};
  workspaceId = seed.workspaceId;
  load();
});

// Signal ready
window.parent.postMessage({ type: 'ui/ready' }, '*');
</script>
</body>
</html>
