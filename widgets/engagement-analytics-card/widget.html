<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Engagement Analytics</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:#111;background:#fff;padding:16px}
  h3{font-size:14px;font-weight:600;margin-bottom:4px}
  p.desc{font-size:12px;color:#666;margin-bottom:12px}
  .loading{color:#888;font-size:12px}
  .error{color:#e53e3e;font-size:12px;padding:8px;background:#fff5f5;border-radius:6px}
  .section{margin-bottom:16px}
  .section-title{font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:left;padding:5px 8px;border-bottom:1px solid #e5e7eb;color:#6b7280;font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  td{padding:5px 8px;border-bottom:1px solid #f3f4f6;color:#374151;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  td.count{text-align:right;font-weight:600;color:#111;white-space:nowrap}
  td.path{font-family:monospace;font-size:11px}
  .journey-row{padding:6px 8px;border-bottom:1px solid #f3f4f6}
  .journey-id{font-size:10px;color:#9ca3af;font-family:monospace}
  .journey-pages{font-size:11px;color:#6b7280;margin-top:2px;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .empty{color:#9ca3af;font-size:12px;padding:8px 0;text-align:center}
  .periods{display:flex;gap:4px;margin-bottom:12px}
  .period-btn{padding:2px 8px;border-radius:4px;border:1px solid #e5e7eb;font-size:11px;cursor:pointer;background:#fff;color:#6b7280}
  .period-btn.active{background:#111;color:#fff;border-color:#111}
</style>
</head>
<body>
<div id="app"><p class="loading">Loading…</p></div>

<script>
// ── callTool bridge ──────────────────────────────────────────────────────────
function callTool(name, args) {
  return new Promise(function(resolve, reject) {
    var id = Math.random().toString(36).slice(2) + Date.now();
    function handler(e) {
      var d = e.data;
      if (!d || d.type !== 'ui/toolResult' || d.id !== id) return;
      window.removeEventListener('message', handler);
      if (d.ok) resolve(d.result);
      else reject(new Error(d.error || 'tool error'));
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: 'ui/callTool', id: id, name: name, args: args }, '*');
  });
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

var workspaceId = null;
var period = '7d';

function tableHtml(rows, cols, emptyMsg) {
  if (!rows || rows.length === 0) return '<div class="empty">'+esc(emptyMsg)+'</div>';
  var ths = cols.map(function(c){ return '<th'+(c.right?' style="text-align:right"':'')+'>'+esc(c.label)+'</th>'; }).join('');
  var trs = rows.slice(0, 15).map(function(row){
    var tds = cols.map(function(c){
      var v = row[c.key];
      var cls = c.cls || '';
      return '<td class="'+cls+'"'+(c.right?' style="text-align:right"':'')+'>'+esc(v == null ? '' : v)+'</td>';
    }).join('');
    return '<tr>'+tds+'</tr>';
  }).join('');
  return '<table><thead><tr>'+ths+'</tr></thead><tbody>'+trs+'</tbody></table>';
}

function journeysHtml(rows) {
  if (!rows || rows.length === 0) return '<div class="empty">No multi-page journeys captured yet.</div>';
  return rows.slice(0,10).map(function(row){
    var pages = (row.pages || []).map(function(p){ return p.path || '/'; });
    var chain = pages.slice(0, 5).join(' → ');
    if (pages.length > 5) chain += ' +' + (pages.length-5) + ' more';
    return '<div class="journey-row">'
      + '<div class="journey-id">'+esc((row.session_id||'').slice(0,8))+' · '+esc(pages.length)+' pages</div>'
      + '<div class="journey-pages">'+esc(chain)+'</div>'
      + '</div>';
  }).join('');
}

function render(popular, failed, feedback, journeys) {
  var app = document.getElementById('app');
  var periodHtml = '<div class="periods">'
    + ['24h','7d','30d'].map(function(p){
      return '<button class="period-btn'+(p===period?' active':'')+'" data-period="'+p+'">'+p.toUpperCase()+'</button>';
    }).join('') + '</div>';

  var html = '<h3>Searches, Feedback &amp; Journeys</h3>' + periodHtml;

  html += '<div class="section"><div class="section-title">Popular Searches</div>'
    + tableHtml((popular||{}).data, [{label:'Query',key:'query'},{label:'Count',key:'count',right:true,cls:'count'}], 'No search activity yet.')
    + '</div>';

  html += '<div class="section"><div class="section-title">Failed Searches</div>'
    + tableHtml((failed||{}).data, [{label:'Query',key:'query'},{label:'Count',key:'count',right:true,cls:'count'}], 'No failed searches yet.')
    + '</div>';

  html += '<div class="section"><div class="section-title">Negative Feedback</div>'
    + tableHtml((feedback||{}).data, [{label:'Page',key:'path',cls:'path'},{label:'Dislikes',key:'dislikes',right:true,cls:'count'}], 'No negative feedback yet.')
    + '</div>';

  html += '<div class="section"><div class="section-title">Page Journeys</div>'
    + journeysHtml((journeys||{}).data)
    + '</div>';

  app.innerHTML = html;

  app.querySelectorAll('.period-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      period = btn.getAttribute('data-period') || '7d';
      load();
    });
  });
}

function load() {
  if (!workspaceId) return;
  document.getElementById('app').innerHTML = '<p class="loading">Loading…</p>';
  var args = { workspaceId: workspaceId, period: period };
  Promise.all([
    callTool('analytics.popular_searches', args),
    callTool('analytics.failed_searches', args),
    callTool('analytics.negative_feedback', args),
    callTool('analytics.page_journeys', args),
  ]).then(function(results) {
    render(results[0], results[1], results[2], results[3]);
  }).catch(function(err) {
    document.getElementById('app').innerHTML = '<p class="error">Failed to load: ' + esc(err.message) + '</p>';
  });
}

window.addEventListener('message', function(e) {
  var d = e.data;
  if (!d || d.type !== 'ui/initialize') return;
  var seed = d.seed || {};
  workspaceId = seed.workspaceId;
  var range = seed.range || '7d';
  period = /^\d+$/.test(String(range)) ? (String(range)+'d') : String(range);
  load();
});

window.parent.postMessage({ type: 'ui/ready' }, '*');
</script>
</body>
</html>
